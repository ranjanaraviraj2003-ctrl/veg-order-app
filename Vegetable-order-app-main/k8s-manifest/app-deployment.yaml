apiVersion: apps/v1
kind: Deployment
metadata:
  name: vegetable-deployment
  namespace: ranjana-ns

spec:
  replicas: 3
  selector:
    matchLabels:
      app: vegetable
  template:
    metadata:
      labels:
        app: vegetable
    spec:
      containers: 
      - name: vegetable-app
        image: ranjana10703/vegetable-order-app:v1.0.1
        ports:
        - containerPort: 3000
        env:
          - name: MONGODB_URI
            valueFrom:
              configMapKeyRef:
                name: configmap
                key: MONGODB_URI
          - name: PORT
            valueFrom:
              configMapKeyRef:
                name: configmap
                key: PORT

